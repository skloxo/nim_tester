name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript compilation check
        run: bun run compile-check

      - name: Run tests with coverage
        run: bun test --coverage > coverage-output.txt 2>&1 || true

      - name: Generate coverage summary
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Extract coverage percentages
          COVERAGE_LINE=$(grep -E "All files" coverage-output.txt | awk '{print $4}')
          COVERAGE_FUNC=$(grep -E "All files" coverage-output.txt | awk '{print $2}')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Line Coverage**: ${COVERAGE_LINE:-N/A}" >> $GITHUB_STEP_SUMMARY
          echo "- **Function Coverage**: ${COVERAGE_FUNC:-N/A}" >> $GITHUB_STEP_SUMMARY

      - name: Check coverage threshold
        run: |
          # Show coverage output for debugging
          echo "Coverage output:"
          cat coverage-output.txt | tail -20
          echo "---"
          
          # Extract line coverage percentage (handle different formats)
          COVERAGE_LINE=$(grep "All files" coverage-output.txt | awk -F'|' '{print $3}' | tr -d ' %')
          
          if [ -z "$COVERAGE_LINE" ]; then
            echo "⚠️ Could not extract coverage percentage from coverage-output.txt"
            echo "Trying alternative extraction..."
            COVERAGE_LINE=$(grep -oP '\d+\.\d+(?=\s*\|)' coverage-output.txt | head -2)
            COVERAGE_LINE=$(echo "$COVERAGE_LINE" | tail -1)
          fi
          
          if [ -z "$COVERAGE_LINE" ]; then
            echo "❌ Could not extract coverage percentage"
            exit 1
          fi
          
          echo "📊 Line Coverage: ${COVERAGE_LINE}%"
          echo "📏 Threshold: 65%"
          
          # Compare coverage against threshold (65%)
          if [ "$(echo "$COVERAGE_LINE < 65" | bc -l)" -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE_LINE}% is below 65% threshold"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Coverage Check Failed" >> $GITHUB_STEP_SUMMARY
            echo "Line coverage **${COVERAGE_LINE}%** is below the required **65%** threshold." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ Coverage ${COVERAGE_LINE}% meets the 65% threshold"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ Coverage Check Passed" >> $GITHUB_STEP_SUMMARY
            echo "Line coverage **${COVERAGE_LINE}%** meets the required **65%** threshold." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-output
          path: coverage-output.txt
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check code style
        run: bun run compile-check
