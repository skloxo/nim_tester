<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>API 模型测试平台</title>
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1f2937;--border:#374151;--acc:#6366f1;--acc2:#8b5cf6;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--tx:#f9fafb;--muted:#9ca3af}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#1e1b4b,#312e81);padding:20px 32px;display:flex;align-items:center;gap:16px;border-bottom:1px solid #4338ca}
header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(90deg,#a5b4fc,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#a5b4fc;font-size:.85rem;margin-top:2px}
.badge{background:#312e81;border:1px solid #4338ca;border-radius:20px;padding:4px 12px;font-size:.75rem;color:#a5b4fc}
main{max-width:1400px;margin:0 auto;padding:24px}

/* Config Panel */
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px}
.card-title{font-size:1rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:4px}
input,select,textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:.85rem;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:80px;font-family:monospace;font-size:.78rem}

/* Buttons */
.btn{border:none;border-radius:8px;padding:10px 24px;font-weight:600;cursor:pointer;transition:all .2s;font-size:.9rem}
.btn-primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}

/* Progress */
#progress-section{display:none}
.step-list{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.step{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:.8rem;color:var(--muted);transition:all .3s}
.step.active{border-color:var(--acc);color:var(--acc);background:#1e1b4b}
.step.done{border-color:var(--ok);color:var(--ok);background:#022c22}

/* Category progress bars */
.cat-bars{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}
.cat-bar-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px}
.cat-bar-name{font-size:.82rem;font-weight:600;margin-bottom:8px}
.bar-track{background:#374151;border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .4s ease;width:0}
.cat-stats{display:flex;justify-content:space-between;margin-top:6px;font-size:.72rem;color:var(--muted)}

/* Log console */
#log-console{background:#020617;border:1px solid #1e3a5f;border-radius:10px;height:220px;overflow-y:auto;padding:12px;font-family:'Cascadia Code','Consolas',monospace;font-size:.75rem;line-height:1.6}
.log-info{color:#60a5fa}.log-warning{color:var(--warn)}.log-error{color:var(--err)}

/* Results */
#results-section{display:none}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;cursor:pointer;border-radius:8px 8px 0 0;font-size:.82rem;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all .2s}
.tab.active{background:var(--s2);border-color:var(--border);color:var(--tx)}
.tab-content{display:none}.tab-content.active{display:block}

table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--s2);padding:10px 12px;text-align:left;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid #1f2937;vertical-align:middle}
tr:hover td{background:#131b2e}
.rank-1{color:#fbbf24;font-size:1rem}.rank-2{color:#9ca3af;font-size:1rem}.rank-3{color:#b45309;font-size:1rem}
.grade{display:inline-block;padding:2px 10px;border-radius:12px;font-weight:700;font-size:.8rem}
.grade-S{background:#7b2fbe;color:#fff}.grade-A{background:#1d4ed8;color:#fff}
.grade-B{background:#047857;color:#fff}.grade-C{background:#b45309;color:#fff}
.grade-D{background:#374151;color:#9ca3af}.grade-F{background:#450a0a;color:#ef4444}
.use-case-tag{display:inline-block;background:#1e2a40;border:1px solid #374151;border-radius:12px;padding:2px 8px;margin:2px;font-size:.72rem;color:#93c5fd}
.tps-bar{display:inline-block;width:60px;height:6px;background:var(--s2);border-radius:3px;vertical-align:middle;margin-right:4px}
.tps-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ok),#34d399)}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.summary-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.summary-card .num{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.summary-card .lbl{font-size:.78rem;color:var(--muted);margin-top:4px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-pass{background:var(--ok)}.dot-fail{background:var(--err)}.dot-skip{background:var(--warn)}
</style>
</head>
<body>
<header>
  <div>
    <h1>🧪 API 模型测试平台</h1>
    <p>全自动测速 · 分类测试 · 智能评分 · 场景推荐</p>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <span class="badge" id="status-badge">待机</span>
    <button class="btn btn-primary" id="btn-start" onclick="startRun()">▶ 开始测试</button>
    <button class="btn btn-outline btn-sm" onclick="exportExcel()" style="display:none" id="btn-export">📥 导出 Excel</button>
  </div>
</header>

<main>
<!-- Profiles bar -->
<div class="card" id="profiles-card" style="padding:14px 20px">
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:.85rem;font-weight:600;color:var(--muted)">📁 API 档案</span>
    <select id="profile-select" style="flex:1;min-width:180px;max-width:320px" onchange="loadProfile()"><option value="">— 选择历史档案 —</option></select>
    <button class="btn btn-outline btn-sm" onclick="saveProfileDialog()">💾 保存当前</button>
    <button class="btn btn-outline btn-sm" onclick="deleteProfile()" id="btn-del-profile" style="color:var(--err);border-color:var(--err);display:none">🗑 删除</button>
    <span id="catalog-badge" style="font-size:.72rem;color:var(--muted);margin-left:auto"></span>
  </div>
</div>

<!-- Config -->
<div class="card" id="config-card">
  <div class="card-title">⚙️ 测试配置</div>
  <div class="row">
    <div>
      <label>Base URL</label>
      <input id="cfg-url" value="https://integrate.api.nvidia.com/v1">
    </div>
    <div>
      <label>代理地址（留空不使用）</label>
      <input id="cfg-proxy" value="">
    </div>
  </div>
  <div style="margin-top:12px">
    <label>API 密钥（每行一个）</label>
    <textarea id="cfg-keys" rows="4"></textarea>
  </div>
  <div class="row" style="margin-top:12px">
    <div>
      <label>并发数</label>
      <input id="cfg-concurrency" type="number" value="10" min="1" max="50">
    </div>
    <div>
      <label>每 Key 每分钟限速（0=不限）</label>
      <input id="cfg-rate-limit" type="number" value="40" min="0" max="999">
    </div>
  </div>
  <div class="row" style="margin-top:12px">
    <div>
      <label>仅跑必选用例（快速扫描）</label>
      <select id="cfg-required-only">
        <option value="false">否（全量测试）</option>
        <option value="true">是（快速扫描）</option>
      </select>
    </div>
    <div></div>
  </div>
</div>

<!-- Progress -->
<div id="progress-section">
  <div class="card">
    <div class="card-title">📡 测试进度</div>
    <div class="step-list" id="step-list">
      <div class="step" id="step-1">①测速</div>
      <div class="step" id="step-2">②拉取模型</div>
      <div class="step" id="step-25">③元数据</div>
      <div class="step" id="step-3">④智能分组</div>
      <div class="step" id="step-4">⑤分类测试</div>
      <div class="step" id="step-5">⑥生成报告</div>
    </div>
    <div class="cat-bars" id="cat-bars"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:.82rem;color:var(--muted)">📋 实时日志</span>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('log-console').innerHTML=''">清空</button>
    </div>
    <div id="log-console"></div>
  </div>
</div>

<!-- Results -->
<div id="results-section">
  <div class="card">
    <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>📊 测试结果</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="showSection('current')" id="btn-view-current" style="color:var(--acc)">当前结果</button>
        <button class="btn btn-outline btn-sm" onclick="showSection('history')">📜 历史记录</button>
        <button class="btn btn-outline btn-sm" id="btn-export-result" onclick="exportCurrentExcel()" style="display:none">📥 导出 Excel</button>
      </div>
    </div>
    <div id="section-current">
      <div class="summary-grid" id="summary-grid"></div>
      <div class="tabs" id="tabs"></div>
      <div id="tab-contents"></div>
    </div>
    <div id="section-history" style="display:none">
      <div id="history-list"><div style="color:var(--muted);text-align:center;padding:40px">加载中...</div></div>
    </div>
  </div>
</div>
</main>

<script>
let evtSource = null;
let catState = {};  // {cat: {done, total, desc}}
let allScored = null;
let eventIdx = 0;
let _catDescs = {};  // category key -> Chinese description
let _currentRunId = null;  // 当前正在查看的 run_id

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    document.getElementById('cfg-url').value = cfg.api?.base_url || '';
    document.getElementById('cfg-proxy').value = cfg.network?.proxy || '';
    document.getElementById('cfg-keys').value = (cfg.api_keys || []).join('\n');
    document.getElementById('cfg-concurrency').value = cfg.testing?.concurrency || 10;
    document.getElementById('cfg-rate-limit').value = cfg.testing?.rate_limit_per_key ?? 40;
    document.getElementById('cfg-required-only').value = cfg.testing?.required_only ? 'true' : 'false';
    // 存储分类描述，供历史记录显示中文名称
    if (cfg.model_categories) {
      Object.entries(cfg.model_categories).forEach(([k, v]) => { _catDescs[k] = v.description || k; });
    }
  } catch(e) { console.warn('config load failed', e); }
}

async function loadProfiles() {
  try {
    const r = await fetch('/api/profiles'); const d = await r.json();
    const sel = document.getElementById('profile-select');
    sel.innerHTML = '<option value="">— 选择历史档案 —</option>';
    (d.profiles || []).forEach(p => {
      const opt = document.createElement('option'); opt.value = p.name; opt.textContent = p.name;
      if (p.name === d.last_used) opt.selected = true;
      sel.appendChild(opt);
    });
    if (d.last_used) { sel.value = d.last_used; loadProfile(); }
    document.getElementById('btn-del-profile').style.display = d.profiles?.length ? 'inline-block' : 'none';
  } catch(e) {}
}

async function loadProfile() {
  const name = document.getElementById('profile-select').value; if (!name) return;
  const r = await fetch('/api/profiles'); const d = await r.json();
  const p = (d.profiles||[]).find(x=>x.name===name); if (!p) return;
  document.getElementById('cfg-url').value = p.base_url||'';
  document.getElementById('cfg-proxy').value = p.proxy||'';
  document.getElementById('cfg-keys').value = (p.api_keys||[]).join('\n');
  if (p.rate_limit_per_key != null) document.getElementById('cfg-rate-limit').value = p.rate_limit_per_key;
  document.getElementById('btn-del-profile').style.display = 'inline-block';
}

async function saveProfileDialog() {
  const name = prompt('请输入档案名称（已存在则覆盖）：', document.getElementById('profile-select').value || 'NVIDIA 默认');
  if (!name) return;
  const body = {
    name, base_url: document.getElementById('cfg-url').value,
    api_keys: document.getElementById('cfg-keys').value.split('\n').filter(k=>k.trim()),
    proxy: document.getElementById('cfg-proxy').value,
    rate_limit_per_key: parseInt(document.getElementById('cfg-rate-limit').value)||40
  };
  await fetch('/api/profiles', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  await loadProfiles();
  document.getElementById('profile-select').value = name;
  document.getElementById('btn-del-profile').style.display = 'inline-block';
}

async function deleteProfile() {
  const name = document.getElementById('profile-select').value; if (!name) return;
  if (!confirm(`确认删除档案「${name}」？`)) return;
  await fetch(`/api/profiles/${encodeURIComponent(name)}`, {method:'DELETE'});
  await loadProfiles();
}

async function loadCatalogBadge() {
  try {
    const r = await fetch('/api/catalog/stats'); const d = await r.json();
    if (d.ok) document.getElementById('catalog-badge').textContent =
      `📦 模型目录: ${d.total}个 | 参数量${d.has_params} | 发布日期${d.has_date} | 更新${d.updated_at?.slice(0,10)}`;
  } catch(e) {}
}

async function startRun() {
  document.getElementById('btn-start').disabled = true;
  document.getElementById('status-badge').textContent = '运行中...';
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('config-card').style.display = 'none';
  document.getElementById('log-console').innerHTML = '';
  catState = {};
  eventIdx = 0;

  const body = {
    base_url: document.getElementById('cfg-url').value.trim(),
    api_keys: document.getElementById('cfg-keys').value.split('\n').filter(k => k.trim()),
    proxy: document.getElementById('cfg-proxy').value.trim(),
    concurrency: parseInt(document.getElementById('cfg-concurrency').value) || 10,
    rate_limit_per_key: parseInt(document.getElementById('cfg-rate-limit').value) || 0,
    required_only: document.getElementById('cfg-required-only').value === 'true',
    _profile: document.getElementById('profile-select').value,
  };
  const r = await fetch('/api/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const j = await r.json();
  if (!j.ok) { alert(j.msg); resetUI(); return; }
  listenSSE();
}

function listenSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(`/api/events?since=${eventIdx}`);
  evtSource.onmessage = e => {
    const ev = JSON.parse(e.data);
    eventIdx++;
    handleEvent(ev);
  };
  evtSource.onerror = () => setTimeout(listenSSE, 2000);
}

function handleEvent(ev) {
  if (ev.type === 'log') appendLog(ev.msg, ev.level);
  else if (ev.type === 'step') setStep(ev.step, 'active', ev.label);
  else if (ev.type === 'step_done') setStep(ev.step, 'done', ev.label);
  else if (ev.type === 'groups') initCatBars(ev.groups);
  else if (ev.type === 'model_done') updateCatBar(ev);
  else if (ev.type === 'complete') onComplete(ev);
  else if (ev.type === 'error') { appendLog('❌ ' + ev.msg, 'error'); resetUI(); }
}

function appendLog(msg, level='info') {
  const el = document.getElementById('log-console');
  const line = document.createElement('div');
  line.className = 'log-' + (level === 'warning' ? 'warning' : level === 'error' ? 'error' : 'info');
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStep(n, state, label) {
  const el = document.getElementById(`step-${n}`);
  if (!el) return;
  el.className = 'step ' + state;
  const icons = {active:'⟳ ', done:'✓ '};
  el.textContent = (icons[state]||'') + label;
}

function initCatBars(groups) {
  const cont = document.getElementById('cat-bars');
  cont.innerHTML = '';
  for (const [cat, info] of Object.entries(groups)) {
    // info \u53ef\u80fd\u662f\u65e7\u683c\u5f0f number \u6216\u65b0\u683c\u5f0f {count, desc}
    const count = typeof info === 'number' ? info : info.count;
    const desc = typeof info === 'object' ? info.desc : cat;
    catState[cat] = {done: 0, total: count, desc};
    cont.innerHTML += `<div class="cat-bar-card" id="bar-${cat}">
      <div class="cat-bar-name">${desc}</div>
      <div class="bar-track"><div class="bar-fill" id="fill-${cat}"></div></div>
      <div class="cat-stats">
        <span id="stat-${cat}">0 / ${count}</span>
        <span id="pass-${cat}">-</span>
      </div></div>`;
  }
}

function updateCatBar(ev) {
  const cat = ev.category;
  if (!catState[cat]) return;
  catState[cat].done++;
  catState[cat].passed = (catState[cat].passed || 0) + (ev.passed || 0);
  catState[cat].totalTests = (catState[cat].totalTests || 0) + (ev.total || 0);
  const pct = catState[cat].done / catState[cat].total * 100;
  const fill = document.getElementById(`fill-${cat}`);
  if (fill) fill.style.width = pct + '%';
  const stat = document.getElementById(`stat-${cat}`);
  if (stat) stat.textContent = `${catState[cat].done} / ${catState[cat].total}`;
  const passStat = document.getElementById(`pass-${cat}`);
  if (passStat) {
    const rate = catState[cat].totalTests > 0
      ? Math.round(catState[cat].passed / catState[cat].totalTests * 100) : 0;
    passStat.textContent = `通过率 ${rate}%`;
  }
}

function onComplete(ev) {
  if (evtSource) evtSource.close();
  allScored = ev.scored;
  _currentRunId = ev.run_id || null;
  document.getElementById('status-badge').textContent = '✓ 完成';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-export').style.display = 'inline-block';
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('btn-export-result').style.display = 'inline-block';
  appendLog('✅ 测试完成，报告已自动生成！', 'info');
  renderResults(ev.scored);
  document.getElementById('section-current').style.display = 'block';
  document.getElementById('section-history').style.display = 'none';
  // 刷新历史记录数量 badge
  fetch('/api/history').then(r=>r.json()).then(d=>{
    const runs = d.runs||[];
    const btn = document.querySelector("button[onclick=\"showSection('history')\"]");
    if (btn && runs.length > 0) btn.innerHTML = `📜 历史记录 <span style="background:#6366f1;color:#fff;border-radius:10px;padding:1px 7px;font-size:.72rem;margin-left:4px">${runs.length}</span>`;
  }).catch(()=>{});
}

function showSection(name) {
  document.getElementById('section-current').style.display = name==='current' ? 'block' : 'none';
  document.getElementById('section-history').style.display = name==='history' ? 'block' : 'none';
  if (name==='history') loadHistory();
}

async function loadHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div style="color:var(--muted);text-align:center;padding:30px">加载中...</div>';
  try {
    const r = await fetch('/api/history'); const d = await r.json();
    if (!d.ok || !d.runs?.length) { el.innerHTML='<div style="color:var(--muted);text-align:center;padding:40px">暂无历史记录</div>'; return; }
    let html = '<table><thead><tr><th>Run ID</th><th>档案</th><th>Base URL</th><th>开始时间</th><th>完成时间</th><th>模型数</th><th>操作</th></tr></thead><tbody>';
    d.runs.forEach(run => {
      html += `<tr>
        <td style="font-family:monospace;font-size:.75rem">${run.run_id}</td>
        <td>${run.profile||'-'}</td>
        <td style="font-size:.75rem;color:var(--muted)">${(run.base_url||'').replace('https://','')}</td>
        <td>${(run.started_at||'-').replace('T',' ').slice(0,16)}</td>
        <td>${(run.finished_at||'-').replace('T',' ').slice(0,16)}</td>
        <td>${run.model_count||0}</td>
        <td><button class="btn btn-outline btn-sm" onclick="loadHistoryRun('${run.run_id}')">查看</button></td>
      </tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) { el.innerHTML='<div style="color:var(--err)">加载失败: '+e+'</div>'; }
}

async function loadHistoryRun(runId) {
  const r = await fetch('/api/history/'+runId); const d = await r.json();
  if (!d.ok) { alert('加载失败: '+d.msg); return; }
  _currentRunId = runId;  // 记录当前 run_id
  // 重建 scored 结构供 renderResults 使用
  const scored = {};
  d.results.forEach(row => {
    if (!scored[row.category]) scored[row.category] = {
      description: _catDescs[row.category] || row.category,
      models: {}
    };
    // use_cases 后端已 json.loads 返回 list，前端无需再次 JSON.parse
    const useCases = Array.isArray(row.use_cases) ? row.use_cases
                   : (typeof row.use_cases === 'string' ? JSON.parse(row.use_cases || '[]') : []);
    scored[row.category].models[row.model_id] = {
      score: row.score, grade: row.grade, rank: row.rank,
      avg_tps: row.avg_tps, passed: row.passed, total: row.total,
      use_cases: useCases.join('、'),
      results: []
    };
  });
  allScored = scored;
  document.getElementById('section-current').style.display = 'block';
  document.getElementById('section-history').style.display = 'none';
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('btn-export-result').style.display = 'inline-block';
  renderResults(scored);
}

function resetUI() {
  document.getElementById('btn-start').disabled = false;
  document.getElementById('status-badge').textContent = '待机';
}

// ── Results rendering ──────────────────────────────────────────────────────
function renderResults(scored) {
  if (!scored) return;
  const cats = Object.keys(scored);

  // Summary cards
  let totalModels = 0, totalPassed = 0, totalCases = 0;
  for (const cat of cats) {
    const models = scored[cat].models;
    totalModels += Object.keys(models).length;
    for (const m of Object.values(models)) {
      totalPassed += m.passed; totalCases += m.total;
    }
  }
  document.getElementById('summary-grid').innerHTML = `
    <div class="summary-card"><div class="num">${cats.length}</div><div class="lbl">测试分类</div></div>
    <div class="summary-card"><div class="num">${totalModels}</div><div class="lbl">模型总数</div></div>
    <div class="summary-card"><div class="num">${totalCases}</div><div class="lbl">用例总数</div></div>
    <div class="summary-card"><div class="num">${Math.round(totalPassed/totalCases*100)}%</div><div class="lbl">整体通过率</div></div>`;

  // 先计算每分类 TPS 最大値（buildCatTable 会用到）
  window._catMaxTps = {};
  for (const cat of cats) {
    const tpsList = Object.values(scored[cat].models).map(m => m.avg_tps).filter(t => t > 0);
    window._catMaxTps[cat] = tpsList.length ? Math.max(...tpsList) : 1;
  }

  // Tabs — 一次性设置 innerHTML，避免循环内 += 导致 onclick 单引号被转义
  const tabs = document.getElementById('tabs');
  const contents = document.getElementById('tab-contents');
  tabs.innerHTML = cats.map((cat, i) =>
    `<div class="tab${i===0?' active':''}" onclick="switchTab('${cat}')" id="tab-btn-${cat}">${scored[cat].description}</div>`
  ).join('');
  contents.innerHTML = cats.map((cat, i) =>
    `<div class="tab-content${i===0?' active':''}" id="tab-${cat}">${buildCatTable(cat, scored[cat])}</div>`
  ).join('');
}

function buildCatTable(cat, catData) {
  const models = Object.entries(catData.models).sort((a, b) => (a[1].rank||99) - (b[1].rank||99));
  let html = `<table><thead><tr>
    <th>排名</th><th>模型 ID</th><th>评分</th><th>等级</th>
    <th>通过 / 总数</th><th>Tokens/s</th><th>平均响应(ms)</th><th>推荐场景</th><th>详情</th></tr></thead><tbody>`;
  for (const [mid, m] of models) {
    const rankBadge = m.rank === 1 ? '🥇' : m.rank === 2 ? '🥈' : m.rank === 3 ? '🥉' : `#${m.rank}`;
    const tpsPct = window._catMaxTps?.[cat] > 0 ? (m.avg_tps||0) / window._catMaxTps[cat] * 100 : 0;
    // use_cases 可能是数组（内存结果/SSE）或字符串（历史加载），均兼容
    const ucList = Array.isArray(m.use_cases) ? m.use_cases
                 : (m.use_cases || '').split('、').filter(Boolean);
    const tags = ucList.map(t => `<span class="use-case-tag">${t}</span>`).join('');
    const passRate = m.total > 0 ? Math.round(m.passed / m.total * 100) : 0;
    const avgElapsed = m.avg_elapsed ? `${Math.round(m.avg_elapsed)} ms` : '-';
    const tpsVal = m.avg_tps > 0 ? m.avg_tps.toFixed(1) : '-';
    html += `<tr>
      <td><span class="rank-${m.rank}">${rankBadge}</span></td>
      <td style="font-family:monospace;font-size:.78rem">${mid}</td>
      <td><b>${m.score}</b></td>
      <td><span class="grade grade-${m.grade}">${m.grade}</span></td>
      <td>${m.passed} / ${m.total} <span style="color:var(--muted);font-size:.75rem">(${passRate}%)</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:4px">
          <div class="tps-bar"><div class="tps-fill" style="width:${tpsPct}%"></div></div>
          <span>${tpsVal}</span>
        </div>
      </td>
      <td style="color:var(--muted);font-size:.8rem">${avgElapsed}</td>
      <td>${tags}</td>
      <td><button class="btn btn-outline btn-sm" onclick="showDetail('${cat}','${mid}')">详情</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  return html;
}

function switchTab(cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-btn-${cat}`)?.classList.add('active');
  document.getElementById(`tab-${cat}`)?.classList.add('active');
}

async function showDetail(cat, mid) {
  let m = allScored?.[cat]?.models?.[mid];
  if (!m) return;
  // 如果详细结果已被剪裁，请求服务端全量数据
  if (!m.results || m.results.length === 0) {
    try {
      const resp = await fetch('/api/results');
      const data = await resp.json();
      if (data.ok) { allScored = data.scored; m = allScored?.[cat]?.models?.[mid]; }
    } catch(e) {}
  }
  const rows = (m?.results || []).map(r => {
    const icon = r.status==='pass' ? '✅' : r.status==='skip' ? '⏭️' : '❌';
    const preview = (r.content_preview||r.reason||'').substring(0,120);
    return `<tr><td style="white-space:nowrap">${r.case_name||r.test||''}</td>
      <td style="white-space:nowrap">${icon} ${r.status}</td>
      <td style="white-space:nowrap">${r.elapsed_ms||'-'}ms</td>
      <td style="white-space:nowrap">${r.tps||'-'}</td>
      <td style="font-size:.72rem;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${preview.replace(/"/g,'')}"><span>${preview}</span></td></tr>`;
  }).join('');
  const ucList = Array.isArray(m.use_cases) ? m.use_cases : (m.use_cases || '').split('、').filter(Boolean);
  const badgesHtml = ucList.map(t => `<span class="badge">${t}</span>`).join(' ');
  const w = window.open('', '_blank', 'width=940,height=620');
  if (!w) { alert('请允许弹出窗口'); return; }
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${mid}</title>
    <style>*{box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0a0e1a;color:#f9fafb;padding:20px;margin:0}
    h2{color:#a5b4fc;margin-bottom:8px;font-size:.95rem;word-break:break-all}
    .meta{color:#9ca3af;margin-bottom:12px;font-size:.82rem;display:flex;flex-wrap:wrap;gap:12px}
    .badge{background:#1e2a40;border:1px solid #374151;border-radius:12px;padding:2px 10px;font-size:.75rem;color:#93c5fd}
    table{width:100%;border-collapse:collapse;font-size:.8rem}
    th{background:#1f2937;padding:8px 12px;text-align:left;color:#6b7280;position:sticky;top:0}
    td{padding:8px 12px;border-bottom:1px solid #1f2937;vertical-align:middle}</style>
    </head><body>
    <h2>🧪 ${mid}</h2>
    <div class="meta">
      <span>评分 <b style="color:#a5b4fc">${m.score}</b></span>
      <span>等级 <b>${m.grade}</b></span>
      <span>排名 <b>#${m.rank}</b></span>
      <span>TPS <b>${m.avg_tps||'-'}</b></span>
    </div>
    <div style="margin-bottom:14px">${badgesHtml}</div>
    <table><thead><tr><th>用例</th><th>状态</th><th>耗时</th><th>TPS</th><th>输出预览</th></tr></thead>
    <tbody>${rows}</tbody></table></body></html>`);
  w.document.close();
}

async function exportExcel() {
  window.open('/api/export/excel', '_blank');
}

async function exportCurrentExcel() {
  if (_currentRunId) {
    // 有 run_id 时从 DB 按次生成
    window.open('/api/export/excel/' + _currentRunId, '_blank');
  } else {
    // 无 run_id（不应该发生，备用）就用最新的
    window.open('/api/export/excel', '_blank');
  }
}

// 先等 loadConfig 填充 _catDescs，再初始化历史（避免分类名显示英文 key）
Promise.all([loadConfig(), loadProfiles(), loadCatalogBadge()]).then(() => initHistory());


// ── 页面初始化：自动加载历史摘要 ──────────────────────────────────────
async function initHistory() {
  try {
    // 1. 获取历史列表，给按钮显示数量 badge
    const hr = await fetch('/api/history');
    const hd = await hr.json();
    const runs = hd.runs || [];
    const btn = document.querySelector("button[onclick=\"showSection('history')\"]");
    if (btn && runs.length > 0) {
      btn.innerHTML = `📋 历史记录 <span style="background:#6366f1;color:#fff;border-radius:10px;padding:1px 7px;font-size:.72rem;margin-left:4px">${runs.length}</span>`;
    }

    // 2. 尝试恢复结果（优先内存结果，其次最近历史）
    const cr = await fetch('/api/results');
    const cd = await cr.json();
    if (cd.ok && cd.scored) {
      // 服务器内存中有结果（重启前的运行结果），直接渲染
      allScored = cd.scored;
      document.getElementById('section-current').style.display = 'block';
      document.getElementById('results-section').style.display = 'block';
      renderResults(cd.scored);
    } else if (runs.length > 0) {
      // 内存无结果，自动从数据库恢复最近一次历史
      await loadHistoryRun(runs[0].run_id);
    }
  } catch(e) {
    console.warn('initHistory error:', e);
  }
}
initHistory();
